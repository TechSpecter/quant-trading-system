# =========================
# STRATEGY CONFIGURATION
# =========================

strategy:
  name: swing_mtf_v1

  # Multi-Timeframe Configuration
  timeframes:
    primary: "D"      # Higher timeframe (trend)
    confirmation: "4H"  # Lower timeframe (entry/trigger)

  data:
    # NOTE: Fyers intraday (<=240 min) supports max 100 days. Keep 4H/1H <= 90 for safety.
    lookback:
      D: 365
      "4H": 90
      "1H": 90
      volume_lookback_days: 3  # fallback for volume-based calculations

    resolution_map:
      D: "1D"
      "4H": "240"
      "1H": "60"

# =========================
# MARKET FILTER
# =========================
market_filter:
  enabled: true
  symbol: "NSE:NIFTY50-INDEX"
  sma_period: 200

# =========================
# INDICATORS
# =========================
indicators:
  sma:
    long_term: 200

  ema:
    fast: 5
    short: 10
    medium: 20
    long: 50

  rsi:
    period: 14
    pullback_range: [38, 55]

  volume:
    ma_period: 20
    breakout_multiplier: 1.2
    lookback_days: 3   # number of days to evaluate volume breakout window

  atr:
    period: 14
    stop_loss_multiplier: 1.5
    target_multiplier: 3        # ATR-based target (e.g., 3x ATR)
    use_for_stop_loss: true     # enable ATR SL
    use_for_target: true        # enable ATR target

# =========================
# TREND RULES (CONFIG-DRIVEN)
# =========================
trend:
  rules:
    - type: comparison
      left: close
      operator: ">"
      right: SMA_200

    - type: comparison
      left: EMA_50
      operator: ">"
      right: SMA_200

    - type: comparison
      left: EMA_20
      operator: ">"
      right: EMA_50

# =========================
# ENTRY RULES
# =========================
entry:
  pullback:
    ema_zone_buffer: 0.02   # 2% proximity to EMA zone
    min_low_volume_days: 2

  trigger:
    ema_cross: true
    volume_confirmation: true

# =========================
# EXIT RULES
# =========================
exit:
  partial:
    rsi_threshold: 70
    scale_out_percent: 50

  trailing:
    ema_break: 20
    ema_cross_exit: true

# =========================
# RISK MANAGEMENT
# =========================
risk:
  capital_per_trade_percent: 1

  # Risk Reward Configuration
  reward_to_risk_ratio: 2        # fallback RR if ATR disabled
  fixed_rr_enabled: true

  # Mode selection
  mode: "atr"                  # options: "fixed_rr" | "atr"

# =========================
# STATE MACHINE
# =========================
state:
  enabled: true
  states:
    - IDLE
    - SETUP
    - ARMED
    - TRIGGERED

# =========================
# SCORING CONFIGURATION
# =========================
scoring:
  trend: 40       # weight for higher timeframe trend (Gate 1)
  pullback: 30    # weight for pullback validation (Gate 2)
  trigger: 30     # weight for entry trigger (Gate 3)

# Optional: you can tweak these later without changing code